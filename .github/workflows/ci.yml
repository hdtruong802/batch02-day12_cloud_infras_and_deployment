name: CI

on:
  push:
    branches: [main, truonghd, feat]
  pull_request:
    branches: [main, feat]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & production readiness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 06-lab-complete

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: development
      AGENT_API_KEY: ci-test-api-key
      JWT_SECRET: ci-test-jwt-secret
      REDIS_URL: redis://127.0.0.1:6379/0
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            06-lab-complete/requirements.txt
            06-lab-complete/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Production readiness check
        run: python check_production_ready.py

      - name: Run API tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t agent-ci:test -f Dockerfile .

      - name: Smoke test container
        run: |
          docker run -d --name agent-ci -p 18000:8000 \
            -e AGENT_API_KEY=ci-test-api-key \
            -e ENVIRONMENT=development \
            agent-ci:test

          for i in $(seq 1 30); do
            if curl -sf http://localhost:18000/health > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -sf http://localhost:18000/health | grep -q '"framework":"FastAPI"'
          curl -sf http://localhost:18000/ | grep -q '"framework":"FastAPI"'

          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:18000/ask \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ci-test-api-key" \
            -d '{"user_id":"smoke","question":"ping"}')
          test "$status" = "200"

          docker logs agent-ci
          docker stop agent-ci
